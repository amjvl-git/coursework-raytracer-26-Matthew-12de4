<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Script RayTracer</title>
    <script src="Main.js" type="module"></script>
</head>
<body>
    
<canvas id="canvas" width="640" height="480" style="border:1px solid#000000;">
Your browser does not support the HTML canvas tag.
</canvas>
<button id="reset">Reset</button>
<a href="../WebGL/index.html"><button>Go to WebGL</button></a>
<br>
<br>
<label for="CanW">Canvas Width</label>
<input type="number" name="CanW" id="CanW" value="400" step="10">
<label for="CanW">Canvas Height</label>
<input type="number" name="CanH" id="CanH" value="300" step="10">
<button id="setcan">Set</button>
<table>
    <tr>
        <td style="padding-right: 50px;">
            <h1>Transform</h1>
            <input type="range" min="-2" max="2" step="0.1" value="0" id="Val">
            <form id="xyz">
                <input type="radio" id="x" value="x" name="xyz">
                <label for="x">X</label>
                <input type="radio" id="y" value="y" name="xyz">
                <label for="y">Y</label>
                <input type="radio" id="z" value="z" name="xyz">
                <label for="z">Z</label>
            </form>
            <h1>Scale</h1>
            <input type="range" min="0.1" max="1" step="0.1" value="0.3" id="scal">
            <h1>Colour</h1>
            <input type="color" value="#ff0000" id="col">
            <br>
            <br>
            <label for="gamma">Gamma Correction</label>
            <input type="checkbox" checked="true" name="gamma" id="gam">
            <br>
            <br>
            <label for="gamma">MultiSamples</label>
            <input type="number" name="sam" id="sam" value="1" min="1">
            <button id="refresh">Refresh</button>
            <br>
            <br>
        </td>
        <td>
            <h1>Light Transform</h1>
            <input type="range" min="-2" max="2" step="0.1" value="-1.1" id="LiTra">
            <form id="lixyz">
                <input type="radio" id="x" value="x" name="xyz">
                <label for="x">X</label>
                <input type="radio" id="y" value="y" name="xyz">
                <label for="y">Y</label>
                <input type="radio" id="z" value="z" name="xyz">
                <label for="z">Z</label>
            </form>
            <br>
            <br>
            <h1>Shadow Opacity</h1>
            <input type="range" min="0" max="1" step="0.1" value="0.4" id="sha">
            <br>
            <br>
            <h1>Specular Intensity</h1>
            <input type="range" min="0" max="10" step="1" value="" id="spec" style="transform: rotate(180deg);">
        </td>
    </tr>
</table>
</body>
</html>
