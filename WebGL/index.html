<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL</title>
    <script
    src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"
    integrity="sha512-zhHQR0/H5SEBL3Wn6yYSaTTZej12z0hVZKOv3TwCUXT1z5qeqGcXJLLrbERYRScEDDpYIJhPC1fk31gqR783iQ=="
    crossorigin="anonymous"
    defer></script>
    <script src="main.js" type="module"></script>
</head>
<body>
    <canvas id="canvas" width="640" height="480"></canvas>
    <button id="reset">Reset</button>
    <a href="../Base Phong Model/index.html"><button>Go To Ray Tracer</button></a>
    <br>
    <input type="checkbox" id="iscolour">Use Colour?
    <br>
    <br>
    <div id="colourArea" style="display: none;">
        <form id="faceSel">
            <input type="radio" id="f" value="front" name="face" checked>
            <label for="f">front</label>
            <input type="radio" id="ba" value="back" name="face">
            <label for="ba">back</label>
            <input type="radio" id="t" value="top" name="face">
            <label for="t">top</label>
            <input type="radio" id="bo" value="bottom" name="face">
            <label for="bo">bottom</labbl>
            <input type="radio" id="l" value="left" name="face">
            <label for="l">left</label>
            <input type="radio" id="r" value="right" name="face">
            <label for="r">right</label>
        </form>
        <br>
        <h4>Colour To Change Face to:</h4>
        <input type="color" id="RGB" value="#ffffff">
        <br>
        <h4>Current Face Colour:</h4>
        <div id="colorBox" style="background-color: #ffffff; border: 1px solid black; width: 150px; height: 150px; justify-content: center;"></div>
    </div>
</body>
</html>
