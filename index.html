<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Script RayTracer</title>
    <script src="Main.js" type="module"></script>
</head>
<body>

<canvas id="canvas" width="800" height="600" style="border:1px solid#000000;">
Your browser does not support the HTML canvas tag.
</canvas>
<br>
<input type="range" min="-1" max="1" step="0.1" value="0" id="Val">
<form id="xyz">
    <input type="radio" id="x" value="x" name="xyz">
    <label for="x">X</label>
    <input type="radio" id="y" value="y" name="xyz">
    <label for="y">Y</label>
    <input type="radio" id="z" value="z" name="xyz">
    <label for="z">Z</label>
</form>
</body>
</html>
